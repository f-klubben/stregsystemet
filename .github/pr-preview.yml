# Generated by yard init — edit as needed
# Docs: https://github.com/Emilvorre/trainyard

app:
  domain: preview.vorre.dev

ingress:
  tls: true
  class: nginx

label: preview

services:
  - name: app
    build:
      context: .
      dockerfile: Dockerfile
    port: 3000
    public: true
    subdomain: "pr-{number}"
    replicas: 1
    resources:
      limits:
        cpu: "250m"
        memory: "128Mi"
    env:
      - name: PORT
        value: "3000"
      - name: DATABASE_URL
        value: "postgres://postgres:postgres@db:5432/app"
    dependsOn:
      - service: db
        port: 5432

  - name: db
    image: postgres:16-alpine
    port: 5432
    public: false
    replicas: 1
    resources:
      limits:
        cpu: "250m"
        memory: "256Mi"
    env:
      - name: POSTGRES_USER
        value: "postgres"
      - name: POSTGRES_PASSWORD
        value: "postgres"
      - name: POSTGRES_DB
        value: "app"
    dependsOn: []

jobs:
  - name: migrate
    build:
      context: .
      dockerfile: Dockerfile.migrate
    dependsOn:
      - service: db
        port: 5432
