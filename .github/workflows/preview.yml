# Generated by yard init

name: PR Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - closed

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:

  deploy:
    if: |
      contains(github.event.pull_request.labels.*.name, 'preview') &&
      github.event.action != 'closed' &&
      github.event.label.name != 'preview'
    uses: Emilvorre/trainyard/.github/workflows/deploy.yml@main
    secrets:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

  deploy-on-label:
    if: |
      github.event.action == 'labeled' &&
      github.event.label.name == 'preview'
    uses: Emilvorre/trainyard/.github/workflows/deploy.yml@main
    secrets:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

  teardown:
    if: |
      github.event.action == 'closed' ||
      (
        github.event.action == 'unlabeled' &&
        github.event.label.name == 'preview'
      )
    uses: Emilvorre/trainyard/.github/workflows/teardown.yml@main
    secrets:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
