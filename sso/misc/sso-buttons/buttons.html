<!-- Public PKCE authorization code flow example -->
<script>
const clientId = "demo";

async function loginWithOIDC(scopes) {
  const redirectUri = "http://127.0.0.1:8000/sso/callback/";
  const issuerAuthEndpoint = "http://127.0.0.1:8000/o/authorize";

  // CSRF protection
  const state = crypto.randomUUID();

  // PKCE
  const verifier = crypto.randomUUID() + crypto.randomUUID();
  const encoder = new TextEncoder();
  const data = encoder.encode(verifier);
  const hash = await crypto.subtle.digest("SHA-256", data);
  const challenge = btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/, "");

  sessionStorage.setItem("oidc_state", state);
  sessionStorage.setItem("pkce_verifier", verifier);

  const params = new URLSearchParams({
    client_id: clientId,
    redirect_uri: redirectUri,
    response_type: "code",
    scope: scopes.join(' '),
    state,
    code_challenge: challenge,
    code_challenge_method: "S256"
  });

  window.location.href = `${issuerAuthEndpoint}?${params.toString()}`;
}
</script>
