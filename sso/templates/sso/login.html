<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h2>Login</h2>

    {% if messages %}
        {% for message in messages %}
            <div style="color: red;">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <!-- STAGE 1: REQUEST OTP -->
        {% if not otp_sent %}
            <div>
                <label for="username">Username:</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    value="{{ username }}"
                    required
                >
            </div>

            <!-- Empty OTP field submitted implicitly -->
            <input type="hidden" name="otp" value="">

            <button type="submit">Send OTP</button>

        <!-- STAGE 2: VERIFY OTP -->
        {% else %}
            <input type="hidden" name="username" value="{{ username }}">

            <div>
                <label for="otp">OTP Code:</label>
                <input
                    type="text"
                    id="otp"
                    name="otp"
                    inputmode="numeric"
                    autocomplete="one-time-code"
                    required
                >
            </div>

            <button type="submit">Verify OTP</button>
        {% endif %}
    </form>
</body>
</html>
