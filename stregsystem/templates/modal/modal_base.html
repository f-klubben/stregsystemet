{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" sizes="any" type="image/svg+xml" href="{% static "/stregsystem/logo/logo.svg" %}">
    <title>{% block title %}TREOENs STREGSYSTEM{% endblock %}</title>

    {% block head %}
    {% endblock %}

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            font-family: system-ui, sans-serif;
            font-size: 15px;
            color: #111;
            padding: 1rem;
        }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .title > img {
            width: 25px;
        }

        label {
          display: block;
          font-size: .8rem;
          font-weight: 500;
          color: #444;
          margin-bottom: .35rem;
          letter-spacing: .03em;
          text-transform: uppercase;
        }

        input[type="text"] {
          width: 100%;
          padding: .65rem .8rem;
          border: 1px solid #ccc;
          border-radius: 6px;
          font-size: .95rem;
          outline: none;
          transition: border-color .15s;
          margin-bottom: 1rem;
        }
        input[type="text"]:focus { border-color: #4a7cf7; }

        button[type="submit"] {
          width: 100%;
          padding: .7rem;
          background: #1a1a1a;
          color: #fff;
          border: none;
          border-radius: 6px;
          font-size: .95rem;
          font-weight: 500;
          cursor: pointer;
          transition: background .15s;
        }
        button[type="submit"]:hover { background: #333; }

        .messages { list-style: none; margin-bottom: 1rem; }
        .messages li {
          font-size: .875rem;
          padding: .6rem .85rem;
          border-radius: 6px;
          margin-bottom: .4rem;
        }
        .messages .error { background: #fff0f0; color: #c0392b; border: 1px solid #fcc; }
        .messages .info  { background: #f0faf5; color: #1a7f4b; border: 1px solid #b2e5cc; }

    </style>
    </head>

    <body>
        <div class="card">
            <div class="title">
                <img src="https://fklub.dk/_media/f-klubben.png"/>
                TREOENs STREGSYSTEM
            </div>

            {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            {% block content %}
            {% endblock %}
        </div>
    </body>
</html>
