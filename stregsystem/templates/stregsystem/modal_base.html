{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}TREOENs STREGSYSTEM{% endblock %}</title>

    {% block head %}
    {% endblock %}

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            font-family: system-ui, sans-serif;
            font-size: 15px;
            color: #111;
            padding: 1rem;
        }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .title > img {
            width: 25px;
        }
    </style>
    </head>

    <body>
        <div class="card">
            <div class="title">
                <img src="https://fklub.dk/_media/f-klubben.png"/>
                TREOENs STREGSYSTEM
            </div>

            {% block content %}
            {% endblock %}
        </div>
    </body>
</html>
